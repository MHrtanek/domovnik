name: domovnik
description: Slovenský Digitálny Domovník – B2B SaaS pre správcov bytových domov.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  supabase_flutter: ^2.3.4
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.19
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.3.3
  flutter_local_notifications: ^17.1.2
  url_launcher: ^6.3.1
  file_picker: ^8.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
